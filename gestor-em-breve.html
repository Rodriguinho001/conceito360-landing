<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Gestor — Em Breve | Conceito 360+</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --charcoal: #121212;
            --royal-blue: #1A56DB;
            --white: #FFFFFF;
            --grey-text: #4B5563;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FDFDFD;
            color: var(--charcoal);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
        }

        .icon-box {
            font-size: 4rem;
            color: var(--royal-blue);
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--grey-text);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-back {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--charcoal);
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--royal-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">
            <i class="fas fa-tools"></i>
        </div>
        <h1>Portal Gestor em Manutenção</h1>
        <p>Estamos refinando as ferramentas de gestão para garantir o rigor técnico e a transparência total que sua obra merece. Em breve, você poderá acompanhar cada detalhe em tempo real.</p>
        <a href="index.html" class="btn-back">Voltar para o Início</a>
    </div>
</body>
</html>
